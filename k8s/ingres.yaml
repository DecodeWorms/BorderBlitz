apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: borderblitz-ingress
  namespace: borderblitz
  annotations:
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "http://localhost:3000"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Origin, Content-Type, Accept, x-user-id"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
    nginx.ingress.kubernetes.io/cors-max-age: "43200"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - borderblitz.local
    secretName: borderblitz-tls
  rules:
  - host: borderblitz.local
    http:
      paths:
      - path: /api/v1
        pathType: Prefix
        backend:
          service:
            name: borderblitz-backend
            port:
              number: 8006