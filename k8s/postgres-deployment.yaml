apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: borderblitz
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:13-alpine
        imagePullPolicy: IfNotPresent
        env:
        - name: POSTGRES_DB
          value: borderless
        - name: POSTGRES_USER
          value: abdulhmeed
        - name: POSTGRES_PASSWORD
          value: Postgres
        ports:
        - containerPort: 5432
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
  - metadata:
      name: postgres-storage
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: borderblitz
spec:
  ports:
  - port: 5432
    targetPort: 5432
  selector:
    app: postgres
