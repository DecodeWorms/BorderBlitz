apiVersion: apps/v1
kind: Deployment
metadata:
  name: borderblitz-backend
  namespace: borderblitz  # Add namespace
spec:
  replicas: 1
  selector:
    matchLabels:
      app: borderblitz-backend
  template:
    metadata:
      labels:
        app: borderblitz-backend
    spec:
      containers:
      - name: borderblitz-backend
        image: decodeworms/borderblitz-backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8006
        env:
        - name: DB_HOST
          value: postgres  # Works because they're in the same namespace
        - name: DB_USER
          value: abdulhmeed
        - name: DB_PASSWORD
          value: Postgres
        - name: DB_NAME
          value: borderless
        - name: DB_PORT
          value: "5432"
        - name: APP_PORT
          value: "8006"
        - name: APP_ENV
          value: development
---
apiVersion: v1
kind: Service
metadata:
  name: borderblitz-backend
  namespace: borderblitz  # Add namespace
spec:
  ports:
  - port: 8006
    targetPort: 8006
  selector:
    app: borderblitz-backend